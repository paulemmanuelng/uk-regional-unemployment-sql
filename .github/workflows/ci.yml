name: Reproduce analysis

# Rebuilds the database from the SQL files, checks the data loaded,
# runs the analysis, and regenerates the charts. A green check means
# the whole project reproduces from scratch.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the database
        run: |
          sqlite3 unemployment.db < schema.sql
          sqlite3 unemployment.db < data.sql

      - name: Check the data loaded (expect 26 rows)
        run: |
          COUNT=$(sqlite3 unemployment.db "SELECT COUNT(*) FROM unemployment;")
          echo "Rows loaded: $COUNT"
          test "$COUNT" -eq 26

      - name: Run the analysis queries
        run: sqlite3 -header -column unemployment.db < queries.sql

      - name: Regenerate the charts
        run: python make_charts.py
